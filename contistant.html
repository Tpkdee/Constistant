<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constistant Shell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shell.css" />
  <link rel="stylesheet" href="css/quantitake.css" />
  <link rel="stylesheet" href="css/feature-panels.css" />
  <link rel="stylesheet" href="css/wizard.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar__brand">Constistant</div>
      <nav class="topbar__nav">
        <a href="pages/boq-summary.html" class="topbar__nav-link">📋 BOQ Summary</a>
        <a href="pages/material-catalog.html" class="topbar__nav-link">🏷️ Material Catalog</a>
      </nav>
      <div class="topbar__calc-wrap">
        <span class="topbar__calc-status" id="pipeline-status"></span>
        <button class="topbar__calc-btn" id="pipeline-calc-btn" onclick="constistant_runPipeline()">🚀 Calculate Project</button>
      </div>
      <div class="topbar__project-switcher">
        <select id="project-select" class="topbar__project-select" onchange="constistant_selectProject(this.value)"></select>
        <button class="topbar__project-new-btn" onclick="constistant_openNewProjectModal()" title="สร้างโปรเจกต์ใหม่">+ New Project</button>
      </div>
    </header>

    <div class="modal-overlay" id="new-project-modal" hidden>
      <div class="modal-card">
        <h2>สร้างโปรเจกต์ใหม่</h2>
        <div class="fp-form-grid">
          <label>ชื่อโครงการ
            <input type="text" id="np-name" placeholder="เช่น บ้านพักอาศัย 2 ชั้น สุขุมวิท" />
          </label>
          <label>ชื่อเจ้าของโครงการ
            <input type="text" id="np-client" placeholder="เช่น คุณสมชาย ใจดี" />
          </label>
          <label>ที่ตั้งโครงการ
            <input type="text" id="np-location" placeholder="เช่น กรุงเทพฯ เขตบางนา" />
          </label>
          <label>วันที่เริ่มโครงการ
            <input type="date" id="np-start-date" />
          </label>
          <label>ประเภทอาคาร
            <select id="np-building-type">
              <option value="residential">ที่อยู่อาศัย</option>
              <option value="commercial">อาคารพาณิชย์</option>
              <option value="mixed">อาคารผสม</option>
            </select>
          </label>
          <label>จำนวนชั้น (เหนือดิน)
            <input type="number" id="np-floors" min="1" step="1" placeholder="2" />
          </label>
          <label>พื้นที่รวม (ตร.ม.)
            <input type="number" id="np-area" min="0" step="any" placeholder="0" />
          </label>
        </div>
        <div class="modal-actions">
          <button class="fp-btn-secondary" onclick="constistant_closeNewProjectModal()">ยกเลิก</button>
          <button class="fp-btn-primary" onclick="constistant_createProject()">+ สร้างโปรเจกต์</button>
        </div>
      </div>
    </div>

    <nav class="tabbar">
      <div class="tabs">
        <a href="#" class="tab tab--active" data-module="Overview">Overview</a>
        <a href="#" class="tab" data-module="Drawing Intelligence">Drawing Intelligence</a>
        <a href="#" class="tab" data-module="BBS">BBS</a>
        <a href="#" class="tab" data-module="Readiness Check">Readiness Check</a>
        <a href="#" class="tab" data-module="Planner">Planner</a>
        <a href="#" class="tab" data-module="Resource Hub">Resource Hub</a>
      </div>
    </nav>

    <main class="main">
      <aside class="sidebar">
        <div class="sidebar__header">Project Browser</div>
        <ul class="sidebar__tree" id="sidebar-tree"></ul>
      </aside>

      <section class="canvas" id="canvas">
        <div class="canvas-panel canvas-panel--app active" data-module="Overview" id="panel-overview">
          <div class="app-panel" id="overview-app"></div>
        </div>
        <div class="canvas-panel canvas-panel--app" data-module="BBS" id="panel-bbs">
          <div class="app-panel" id="bbs-app"></div>
        </div>
        <div class="canvas-panel canvas-panel--app" data-module="Readiness Check" id="panel-readiness">
          <div class="app-panel" id="readiness-app"></div>
        </div>
        <div class="canvas-panel canvas-panel--app" data-module="Planner" id="panel-planner">
          <div class="app-panel" id="planner-app"></div>
        </div>
        <div class="canvas-panel canvas-panel--app" data-module="Resource Hub" id="panel-resource">
          <div class="app-panel" id="resource-app"></div>
        </div>
        <div class="qt-module" id="qt-module" style="display:none;height:100%;overflow-y:auto;padding:24px;"></div>
      </section>

      <aside class="properties">
        <div class="properties__header">รายละเอียดโครงการ</div>
        <div class="properties__body" id="properties-body"></div>
      </aside>
    </main>

    <footer class="statusbar">
      <div id="status-main"></div>
      <div class="statusbar__tag" id="status-tag"></div>
    </footer>
  </div>

  <div id="wizard-overlay" class="wz-overlay" hidden>
    <div class="wz-shell">
      <div class="wz-progress"></div>
      <div id="wizard-step-root" class="wz-step-root"></div>
    </div>
  </div>

  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    }
  </script>
  <script type="module" src="js/shell/shell-index.js"></script>
  <script type="module" src="js/drawing/drawing-index.js"></script>
  <script type="module" src="js/readiness/readiness-index.js"></script>
  <script type="module" src="js/resource/resource-index.js"></script>
  <script type="module" src="js/planner/planner-index.js"></script>
  <script type="module" src="js/bbs/bbs-index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="js/overview/overview-index.js"></script>
</body>
</html>
